name: Update Purchasing Power Data

# Runs every February 1st at 10:00 UTC
# (INSEE typically publishes full-year data in January)
# Can also be triggered manually from GitHub Actions tab
on:
  schedule:
    - cron: "0 10 1 2 *" # Feb 1st - INSEE full-year product prices
    - cron: "0 10 1 3 *" # Mar 1st - INSEE DADS mean/median salary (publishes Feb)
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run data update script
        id: update
        run: |
          # Run in write mode - the script only adds new years, never modifies existing data
          node scripts/update-data.mjs --write 2>&1 | tee /tmp/update-log.txt

          # Expose log as env variable for PR body
          {
            echo "UPDATE_LOG<<EOF"
            cat /tmp/update-log.txt
            echo "EOF"
          } >> "$GITHUB_ENV"

          # Check if data.ts actually changed
          if git diff --quiet client/src/lib/data.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Data changes detected!"
          fi

      - name: Create Pull Request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "data: update prices, SMIC, and salary rates"
          title: "📊 Annual data update"
          body: |
            Automated data update from INSEE.

            **What changed:**
            - Updated product prices from INSEE IPC annual averages
            - Added new SMIC rates (if available)
            - Updated mean salary (net EQTP, idbank 010752366)
            - Updated median salary (net EQTP, idbank 010752342)
            - Updated CPI inflation rates

            **Script output:**
            ```
            ${{ env.UPDATE_LOG }}
            ```

            ## Manual products - please verify before merging

            The following products are **not auto-updated** and must be checked manually:

            $(grep "^\- \[ \]" /tmp/update-log.txt || echo "_(no manual products detected)_")

            ## Pre-merge checklist

            - [ ] Values in `client/src/lib/data.ts` look reasonable (no order-of-magnitude errors)
            - [ ] Manual products above have been reviewed (or deferred with a comment)
            - [ ] `funFact` strings updated if the latest year figure changed materially
            - [ ] `npm run check` passes (TypeScript)
            - [ ] `npm run build` succeeds locally

            ---
            _This PR was created automatically by the [update-data workflow](.github/workflows/update-data.yml)._
          branch: data/auto-update
          delete-branch: true
          labels: |
            data
            automated
